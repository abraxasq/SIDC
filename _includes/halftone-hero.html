<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" aria-label="Lorenzini — Bull and Bear flanking the Federal Reserve" role="img" style="width:100%;height:auto;display:block;">
  <defs>
    <!-- Halftone dot patterns at varying densities -->
    <pattern id="ht-dense" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.9" fill="#1A1A1A"/>
    </pattern>
    <pattern id="ht-medium" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="1.4" fill="#1A1A1A"/>
    </pattern>
    <pattern id="ht-light" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.9" fill="#1A1A1A"/>
    </pattern>
    <pattern id="ht-fine" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.6" fill="#1A1A1A"/>
    </pattern>

    <!-- Radial fade overlay (for subtle vignette / depth) -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="60%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </radialGradient>

    <!-- ===== BULL silhouette (charging right) ===== -->
    <!-- Composed of refined organic paths for body, head, horns, legs, tail -->
    <mask id="bull-mask">
      <g fill="white">
        <!-- Tail: flicked up and back -->
        <path d="M 88,266 C 70,250 58,228 62,200 C 64,180 75,176 82,188 C 86,196 84,210 80,222 C 90,236 100,250 108,262 Z"/>
        <!-- Main body: massive shoulders and back -->
        <path d="M 100,256
                 C 108,228 122,210 145,200
                 C 175,188 215,184 250,188
                 C 275,192 295,200 308,212
                 L 315,232
                 C 320,255 318,278 308,295
                 C 295,310 270,318 240,318
                 C 200,318 160,316 130,310
                 C 110,302 98,285 100,256 Z"/>
        <!-- Neck: thick, powerful, connecting body to head -->
        <path d="M 295,200
                 C 312,195 326,194 340,200
                 C 350,206 354,218 350,232
                 C 344,250 332,260 318,260
                 C 305,258 298,248 295,232 Z"/>
        <!-- Head: lowered, ready to charge -->
        <path d="M 340,205
                 C 360,200 380,200 396,210
                 C 408,220 412,236 408,250
                 C 402,266 388,275 370,275
                 C 354,272 344,262 338,248
                 C 335,232 336,217 340,205 Z"/>
        <!-- Snout (extends to the right) -->
        <path d="M 396,230
                 C 415,228 432,232 442,242
                 C 448,252 444,262 432,266
                 C 418,268 404,264 396,254 Z"/>
        <!-- Left horn (pointing up and back) -->
        <path d="M 348,198 C 342,180 340,160 346,142
                 C 352,138 356,142 358,158
                 C 360,176 358,190 354,200 Z"/>
        <!-- Right horn (pointing up and forward) -->
        <path d="M 386,196 C 392,178 400,162 412,150
                 C 416,148 418,152 416,166
                 C 412,184 402,196 394,202 Z"/>
        <!-- Ear (small, behind right horn) -->
        <path d="M 370,200 C 366,188 368,180 376,178 C 380,184 378,194 374,202 Z"/>
        <!-- Eye dot (negative space simulation) -->
        <!-- Front right leg (further from viewer) -->
        <path d="M 268,310
                 L 264,375
                 L 258,402
                 L 250,402
                 L 254,375
                 L 254,310 Z"/>
        <!-- Front left leg -->
        <path d="M 232,312
                 L 228,378
                 L 220,408
                 L 210,408
                 L 216,378
                 L 218,312 Z"/>
        <!-- Back right leg -->
        <path d="M 156,310
                 L 152,378
                 L 144,406
                 L 134,406
                 L 140,378
                 L 142,310 Z"/>
        <!-- Back left leg (raised slightly) -->
        <path d="M 118,308
                 L 114,372
                 L 106,398
                 L 96,398
                 L 102,370
                 L 104,308 Z"/>
        <!-- Dewlap / chest -->
        <path d="M 285,260 C 290,275 290,288 285,300 C 280,302 274,298 272,288 C 272,278 278,265 285,260 Z"/>
      </g>
    </mask>

    <!-- ===== BEAR silhouette (walking left) ===== -->
    <mask id="bear-mask">
      <g fill="white">
        <!-- Tail (small, right rear) -->
        <path d="M 916,254 C 928,250 936,256 936,266 C 934,276 924,278 914,272 C 912,266 912,260 916,254 Z"/>
        <!-- Body: rounded, with shoulder hump -->
        <path d="M 900,254
                 C 905,228 895,210 870,200
                 C 832,184 778,184 730,198
                 C 700,210 685,228 685,256
                 C 685,288 700,308 730,318
                 C 770,328 820,328 860,318
                 C 888,308 902,288 900,254 Z"/>
        <!-- Shoulder hump (prominent, distinctive bear feature) -->
        <path d="M 745,202
                 C 730,180 712,170 696,176
                 C 686,184 686,200 698,216
                 C 712,226 730,224 745,212 Z"/>
        <!-- Neck connecting to head -->
        <path d="M 698,204
                 C 680,206 666,212 658,222
                 C 654,232 660,242 672,246
                 C 686,244 695,236 700,222 Z"/>
        <!-- Head (rounded, large) -->
        <path d="M 660,212
                 C 638,210 618,218 606,232
                 C 596,244 596,260 608,272
                 C 622,282 642,282 658,274
                 C 672,266 678,252 674,236
                 C 672,224 668,216 660,212 Z"/>
        <!-- Snout (extends left) -->
        <path d="M 606,250
                 C 588,250 572,256 562,266
                 C 558,274 564,282 576,284
                 C 590,284 602,278 610,268 Z"/>
        <!-- Left ear -->
        <path d="M 626,210
                 C 620,196 622,184 632,180
                 C 642,180 646,190 644,202
                 C 640,212 632,214 626,210 Z"/>
        <!-- Right ear -->
        <path d="M 656,206
                 C 652,192 656,180 666,178
                 C 676,180 680,190 676,202
                 C 670,212 662,212 656,206 Z"/>
        <!-- Front left leg (closer to head) -->
        <path d="M 718,308
                 L 716,376
                 L 708,406
                 L 696,406
                 L 700,376
                 L 702,308 Z"/>
        <!-- Front right leg -->
        <path d="M 758,310
                 L 756,376
                 L 748,402
                 L 736,402
                 L 742,376
                 L 744,310 Z"/>
        <!-- Back left leg -->
        <path d="M 838,310
                 L 838,376
                 L 832,404
                 L 820,404
                 L 824,376
                 L 824,310 Z"/>
        <!-- Back right leg -->
        <path d="M 880,308
                 L 880,376
                 L 874,402
                 L 862,402
                 L 866,376
                 L 866,308 Z"/>
      </g>
    </mask>

    <!-- ===== BUILDING silhouette (Federal Reserve / Treasury style) ===== -->
    <mask id="building-mask">
      <g fill="white">
        <!-- Stepped base (3 tiers) -->
        <rect x="396" y="412" width="208" height="14"/>
        <rect x="406" y="398" width="188" height="16"/>
        <rect x="416" y="382" width="168" height="16"/>
        <!-- Floor / platform under columns -->
        <rect x="416" y="378" width="168" height="6"/>
        <!-- Columns (8 fluted-style columns) -->
        <rect x="422" y="252" width="14" height="126"/>
        <rect x="446" y="252" width="14" height="126"/>
        <rect x="470" y="252" width="14" height="126"/>
        <rect x="494" y="252" width="14" height="126"/>
        <rect x="518" y="252" width="14" height="126"/>
        <rect x="542" y="252" width="14" height="126"/>
        <rect x="566" y="252" width="14" height="126"/>
        <!-- Column capitals (slight wider tops) -->
        <rect x="418" y="248" width="166" height="8"/>
        <!-- Architrave / frieze (horizontal band above columns) -->
        <rect x="408" y="232" width="186" height="16"/>
        <!-- Pediment (triangular roof) -->
        <polygon points="404,232 500,168 596,232"/>
        <!-- Pediment top edge (thin band) -->
        <polygon points="404,228 500,166 596,228 500,172"/>
        <!-- Statue/finial atop pediment -->
        <rect x="495" y="148" width="10" height="20"/>
        <ellipse cx="500" cy="148" rx="8" ry="6"/>
        <ellipse cx="500" cy="142" rx="4" ry="4"/>
        <!-- Doorway in center -->
        <rect x="488" y="320" width="24" height="58"/>
      </g>
    </mask>

    <!-- ===== BACKGROUND SKYLINE bars (chart-like spikes) ===== -->
    <mask id="skyline-mask">
      <g fill="white">
        <!-- Left side bars -->
        <rect x="20"  y="250" width="5" height="135"/>
        <rect x="30"  y="220" width="5" height="165"/>
        <rect x="40"  y="270" width="5" height="115"/>
        <rect x="50"  y="240" width="5" height="145"/>
        <rect x="60"  y="200" width="5" height="185"/>
        <rect x="380" y="170" width="5" height="215"/>
        <rect x="390" y="200" width="5" height="185"/>
        <!-- Right side bars -->
        <rect x="608" y="200" width="5" height="185"/>
        <rect x="618" y="170" width="5" height="215"/>
        <rect x="940" y="200" width="5" height="185"/>
        <rect x="950" y="240" width="5" height="145"/>
        <rect x="960" y="270" width="5" height="115"/>
        <rect x="970" y="220" width="5" height="165"/>
        <rect x="980" y="250" width="5" height="135"/>
        <!-- Behind building (chart spikes peeking from sides of building) -->
        <rect x="350" y="150" width="4" height="240"/>
        <rect x="360" y="180" width="4" height="210"/>
        <rect x="370" y="135" width="4" height="255"/>
        <rect x="630" y="135" width="4" height="255"/>
        <rect x="640" y="170" width="4" height="220"/>
        <rect x="650" y="155" width="4" height="235"/>
      </g>
    </mask>
  </defs>

  <!-- ===== Render layers (back to front) ===== -->
  <!-- Background -->
  <rect width="1000" height="560" fill="#F8F6F1"/>

  <!-- LORENZINI wordmark at top -->
  <text x="500" y="92"
        text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-size="56"
        font-weight="500"
        letter-spacing="14"
        fill="#1A1A1A">LORENZINI</text>

  <!-- Skyline (very light dots, far background) -->
  <rect width="1000" height="560" fill="url(#ht-light)" mask="url(#skyline-mask)" opacity="0.55"/>

  <!-- Building (medium dots, mid-ground) -->
  <rect width="1000" height="560" fill="url(#ht-medium)" mask="url(#building-mask)" opacity="0.78"/>

  <!-- Bull (dense dots, foreground) -->
  <rect width="1000" height="560" fill="url(#ht-dense)" mask="url(#bull-mask)"/>

  <!-- Bear (dense dots, foreground) -->
  <rect width="1000" height="560" fill="url(#ht-dense)" mask="url(#bear-mask)"/>

  <!-- Ground line (subtle horizontal rule under figures) -->
  <line x1="60" y1="430" x2="940" y2="430" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="0.5 2.5" opacity="0.4"/>
</svg>
