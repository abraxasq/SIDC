- term: "CAGR"
  full: "Compound Annual Growth Rate"
  plain: "연평균 수익률"
  definition: "The rate at which an investment grows each year on a compounded basis over a specified period. SIDC treats CAGR as the primary success metric in your Spec Sheet."

- term: "MDD"
  full: "Maximum Drawdown"
  plain: "최대 낙폭"
  definition: "The largest peak-to-trough decline in portfolio value over a given period. SIDC requires you to set an MDD tolerance before building your architecture — it is your primary risk constraint."

- term: "Technical Debt"
  full: "Investment Technical Debt"
  plain: "투자 기술부채"
  definition: "Accumulated undocumented assumptions, ad-hoc decisions, and unvalidated strategies in your portfolio. Like software, it compounds silently until it becomes a crisis."

- term: "Spec Sheet"
  full: "Investment Specification Sheet"
  plain: "투자 명세서"
  definition: "The output of Stage 1. A written document defining your CAGR target, MDD tolerance, investment horizon, and constraints. Acts as the binding contract for all subsequent design decisions."

- term: "Blueprint"
  full: "Portfolio Architecture Blueprint"
  plain: "포트폴리오 설계도"
  definition: "The output of Stage 2. A visual and quantitative description of your asset allocation, including target weights, rebalancing triggers, and correlation assumptions."

- term: "QA Report"
  full: "Quality Assurance Report"
  plain: "품질 검증 보고서"
  definition: "The output of Stage 4. A structured summary of backtest results, stress test outcomes, and the overfit warning score for your strategy."

- term: "Sharpe Ratio"
  full: "Sharpe Ratio"
  plain: "위험조정 수익률"
  definition: "A measure of return per unit of risk (standard deviation). A Sharpe above 1.0 is generally considered acceptable; SIDC targets ≥ 1.2 as a QA gate."

- term: "Portfolio Drift"
  full: "Allocation Drift"
  plain: "포트폴리오 드리프트"
  definition: "The deviation of actual asset weights from target weights due to market movements. SIDC's Stage 5 monitors drift continuously and triggers alerts when it exceeds your pre-set threshold."

- term: "Kill Switch"
  full: "Portfolio Kill Switch"
  plain: "손절 트리거"
  definition: "A pre-defined rule that automatically moves the portfolio to cash or a defensive posture when a specified loss threshold is breached. Must be configured in Stage 5."

- term: "Rebalancing"
  full: "Portfolio Rebalancing"
  plain: "리밸런싱"
  definition: "The process of buying and selling assets to restore your portfolio to its target Blueprint weights. SIDC distinguishes between calendar-based and threshold-based rebalancing."
