---
layout: default
---
<div class="page-header">
  <div class="container">
    {% if page.label %}<p class="subhead">{{ page.label }}</p>{% endif %}
    <h1 class="display-md">{{ page.title }}</h1>
    {% if page.description %}<p class="body-text mt-2">{{ page.description }}</p>{% endif %}
  </div>
</div>

<div class="container section">
  {{ content }}
</div>
