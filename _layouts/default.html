<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — Lorenzini{% else %}Lorenzini — 규율로 설계된 투자 아키텍처{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <!-- D3.js v7 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/workspace.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/charts.js' | relative_url }}"></script>
  {% if page.extra_js %}
  {% for js in page.extra_js %}
  <script src="{{ js | relative_url }}"></script>
  {% endfor %}
  {% endif %}
</body>
</html>
